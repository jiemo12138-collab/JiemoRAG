<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>芥末智慧 · 知识库</title>
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent:  #7c6aff;
    --teal:    #43e6b5;
    --bg:      #0e0e16;
    --card:    #16161f;
    --surface: #1e1e2b;
    --text:    #d0d0e8;
    --muted:   #55557a;
    --border:  rgba(124,106,255,0.12);
    --radius:  14px;
    --nav-h:   56px;
  }

  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
  }

  /* ─── 导航 ─── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: var(--nav-h);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px;
    background: rgba(14,14,22,0.92);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo {
    font-size: 17px; font-weight: 900; color: var(--text); letter-spacing: 0.5px;
    display: flex; align-items: center; gap: 10px;
  }
  .nav-logo-avatar {
    width: 28px; height: 28px; border-radius: 50%; overflow: hidden;
    border: 1.5px solid var(--accent); flex-shrink: 0;
  }
  .nav-logo-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .nav-logo span { color: var(--accent); }
  .nav-tag {
    font-size: 11px; font-weight: 600; color: var(--muted);
    background: var(--surface); border: 1px solid var(--border);
    padding: 2px 10px; border-radius: 50px;
  }

  /* ─── 主布局 ─── */
  .layout {
    display: flex;
    height: calc(100vh - var(--nav-h));
    margin-top: var(--nav-h);
  }

  /* ─── 左侧边栏 ─── */
  .sidebar {
    width: 300px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    background: var(--card);
  }
  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-thumb { background: rgba(124,106,255,0.2); border-radius: 4px; }

  .profile-block {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--border);
  }
  .profile-top { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .profile-avatar {
    width: 54px; height: 54px; border-radius: 50%; overflow: hidden; flex-shrink: 0;
    border: 2px solid var(--accent);
    box-shadow: 0 0 16px rgba(124,106,255,0.3);
  }
  .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .profile-name { font-size: 17px; font-weight: 800; }
  .profile-name span { color: var(--accent); }
  .profile-desc { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .profile-btns { display: flex; gap: 8px; }
  .btn {
    padding: 8px 18px; border-radius: 50px; font-size: 12px; font-weight: 700;
    cursor: pointer; border: none; transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 3px 12px rgba(124,106,255,0.3); }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-outline { background: transparent; color: var(--accent); border: 1.5px solid var(--accent); }
  .btn-outline:hover { background: rgba(124,106,255,0.1); }

  .docs-block { padding: 18px 20px; flex: 1; }
  .block-title {
    font-size: 11px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;
  }

  .upload-zone {
    border: 1.5px dashed rgba(124,106,255,0.25); border-radius: 10px;
    padding: 20px; text-align: center; cursor: pointer;
    background: var(--surface); transition: all 0.2s; margin-bottom: 12px;
  }
  .upload-zone:hover, .upload-zone.drag {
    border-color: var(--accent); background: rgba(124,106,255,0.06);
  }
  .upload-icon { font-size: 24px; margin-bottom: 6px; }
  .upload-zone p { color: var(--muted); font-size: 12px; }
  .upload-zone strong { color: var(--accent); }
  #file-input { display: none; }

  .doc-list { display: flex; flex-direction: column; gap: 6px; }
  .doc-item {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border-radius: 8px; padding: 9px 12px;
    border: 1px solid var(--border);
    animation: slideIn 0.25s ease;
  }
  .doc-icon { font-size: 16px; flex-shrink: 0; }
  .doc-name { font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .doc-time { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .doc-status { font-size: 10px; font-weight: 700; color: var(--teal); flex-shrink: 0; }
  .doc-delete {
    background: none; border: none; cursor: pointer; color: var(--muted);
    font-size: 15px; padding: 0 2px; line-height: 1; transition: color 0.15s; flex-shrink: 0;
  }
  .doc-delete:hover { color: #ff5555; }
  @keyframes slideIn { from{opacity:0;transform:translateY(4px);} to{opacity:1;transform:translateY(0);} }

  /* ─── 右侧聊天区 ─── */
  .chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .chat-topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--card);
    flex-shrink: 0;
  }
  .chat-topbar-title { font-size: 14px; font-weight: 700; }
  .mode-row { display: flex; gap: 6px; }
  .mode-chip {
    padding: 4px 14px; border-radius: 50px; font-size: 11px; font-weight: 700;
    border: 1px solid var(--border); color: var(--muted);
    cursor: pointer; background: transparent; transition: all 0.15s;
  }
  .mode-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .mode-chip:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

  .chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .chat-box::-webkit-scrollbar { width: 4px; }
  .chat-box::-webkit-scrollbar-thumb { background: rgba(124,106,255,0.2); border-radius: 4px; }

  .msg { display: flex; gap: 12px; animation: slideIn 0.2s ease; }
  .msg.user { flex-direction: row-reverse; }
  .msg-bubble {
    max-width: 72%; padding: 12px 16px; border-radius: 16px;
    font-size: 14px; line-height: 1.75;
  }
  .msg.ai .msg-bubble {
    background: var(--surface); color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .msg.ai .msg-bubble p { margin: 0 0 8px; }
  .msg.ai .msg-bubble p:last-child { margin-bottom: 0; }
  .msg.ai .msg-bubble h1,.msg.ai .msg-bubble h2,.msg.ai .msg-bubble h3 {
    font-size: 14px; font-weight: 700; margin: 10px 0 4px; color: var(--accent);
  }
  .msg.ai .msg-bubble strong { font-weight: 700; color: var(--text); }
  .msg.ai .msg-bubble em { font-style: italic; color: var(--muted); }
  .msg.ai .msg-bubble ul,.msg.ai .msg-bubble ol { padding-left: 18px; margin: 6px 0; }
  .msg.ai .msg-bubble li { margin: 3px 0; }
  .msg.ai .msg-bubble code {
    background: rgba(124,106,255,0.12); padding: 1px 5px;
    border-radius: 4px; font-size: 12px; font-family: monospace; color: var(--teal);
  }
  .msg.ai .msg-bubble hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
  .msg-bubble.streaming::after {
    content: '▌'; color: var(--accent);
    animation: blink 0.6s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .msg.user .msg-bubble {
    background: var(--accent); color: #fff; border-bottom-right-radius: 4px;
  }
  .msg-avatar {
    width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
    overflow: hidden; display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }
  .msg.ai .msg-avatar { background: var(--surface); border: 1px solid var(--border); }
  .msg.ai .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .msg.user .msg-avatar { background: var(--accent); }

  .chat-input-area {
    border-top: 1px solid var(--border);
    background: var(--card);
    padding: 16px 24px;
    flex-shrink: 0;
  }
  .chat-input-row { display: flex; gap: 10px; align-items: center; }
  .chat-input {
    flex: 1; padding: 12px 20px; border-radius: 50px;
    border: 1.5px solid var(--border);
    font-size: 14px; outline: none;
    background: var(--surface); color: var(--text);
    transition: border-color 0.2s;
  }
  .chat-input::placeholder { color: var(--muted); }
  .chat-input:focus { border-color: var(--accent); }
  .send-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--accent); border: none; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; transition: all 0.2s; flex-shrink: 0;
    box-shadow: 0 3px 12px rgba(124,106,255,0.35);
  }
  .send-btn:hover { opacity: 0.85; transform: scale(1.06); }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

  .typing { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
    animation: bounce 1.2s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:0.35;} 40%{transform:translateY(-5px);opacity:1;} }

  @media(max-width:700px) {
    .sidebar { display: none; }
    .chat-box { padding: 16px; }
    .chat-topbar, .chat-input-area { padding: 12px 16px; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <div class="nav-logo-avatar">
      <img src="../assets/karen.png" alt="" onerror="this.parentElement.innerHTML='🔥'">
    </div>
    Jiemo<span>Base</span>
  </div>
  <div class="nav-tag">LightRAG · DeepSeek · BGE-M3</div>
</nav>

<div class="layout">

  <!-- 左侧栏 -->
  <aside class="sidebar">
    <div class="profile-block">
      <div class="profile-top">
        <div class="profile-avatar">
          <img src="../assets/karen.png" alt="" onerror="this.parentElement.innerHTML='🔥'">
        </div>
        <div>
          <div class="profile-name">Jiemo<span>Base</span></div>
          <div class="profile-desc">个人知识库问答系统</div>
        </div>
      </div>
      <div class="profile-btns">
        <button type="button" class="btn btn-primary" onclick="document.getElementById('file-input').click()">上传文档</button>
        <button type="button" class="btn btn-outline" onclick="document.getElementById('chat-input').focus()">开始提问</button>
      </div>
    </div>

    <div class="docs-block">
      <div class="block-title">文档库</div>
      <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <div class="upload-icon">📄</div>
        <p><strong>点击选择 .txt 文件</strong><br>或拖拽到此处</p>
        <input type="file" id="file-input" accept=".txt" multiple>
      </div>
      <div class="doc-list" id="doc-list"></div>
    </div>
  </aside>

  <!-- 右侧聊天 -->
  <div class="chat-panel">
    <div class="chat-topbar">
      <div class="chat-topbar-title">知识问答</div>
      <div class="mode-row">
        <button type="button" class="mode-chip active" data-mode="hybrid">混合</button>
        <button type="button" class="mode-chip" data-mode="local">局部</button>
        <button type="button" class="mode-chip" data-mode="global">全局</button>
        <button type="button" class="mode-chip" data-mode="naive">普通</button>
      </div>
    </div>
    <div class="chat-box" id="chat-box"></div>
    <div class="chat-input-area">
      <div class="chat-input-row">
        <input class="chat-input" id="chat-input" type="text" placeholder="输入问题，按 Enter 发送…" />
        <button type="button" class="send-btn" id="send-btn">➤</button>
      </div>
    </div>
  </div>

</div>

<script>
const API = 'http://127.0.0.1:8000';
let mode = 'hybrid';

document.querySelectorAll('.mode-chip').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.mode-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
  };
});

// ─── 上传 ───
const fileInput = document.getElementById('file-input');
const dropZone  = document.getElementById('drop-zone');
const docList   = document.getElementById('doc-list');
const STORAGE_KEY = 'mindbase_docs';

fileInput.onchange = e => uploadFiles(e.target.files);
dropZone.ondragover = e => { e.preventDefault(); dropZone.classList.add('drag'); };
dropZone.ondragleave = () => dropZone.classList.remove('drag');
dropZone.ondrop = e => { e.preventDefault(); dropZone.classList.remove('drag'); uploadFiles(e.dataTransfer.files); };

function loadDocHistory() {
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  saved.forEach(({ name, time }) => addDocItem(name, '✓ 已导入', time, false));
}

function saveDocHistory(name, time) {
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  if (!saved.find(d => d.name === name)) {
    saved.unshift({ name, time });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
  }
}

async function uploadFiles(files) {
  for (const file of files) {
    if (!file.name.endsWith('.txt')) { alert('只支持 .txt 文件'); continue; }
    const time = new Date().toLocaleString('zh-CN');
    const item = addDocItem(file.name, '上传中…', time, true);
    const fd = new FormData();
    fd.append('file', file);
    try {
      const r = await fetch(`${API}/upload`, { method: 'POST', body: fd });
      if (r.ok) {
        item.querySelector('.doc-status').textContent = '✓ 已导入';
        saveDocHistory(file.name, time);
      } else {
        item.querySelector('.doc-status').textContent = '✗ 失败';
        item.querySelector('.doc-status').style.color = '#ff5555';
      }
    } catch {
      item.querySelector('.doc-status').textContent = '✗ 无法连接';
      item.querySelector('.doc-status').style.color = '#ff5555';
    }
  }
}

function addDocItem(name, status, time, prepend = true) {
  const el = document.createElement('div');
  el.className = 'doc-item';
  el.dataset.filename = name;
  el.innerHTML = `<div class="doc-icon">📄</div>
    <div style="flex:1;min-width:0">
      <div class="doc-name">${name}</div>
      <div class="doc-time">${time}</div>
    </div>
    <div class="doc-status">${status}</div>
    <button type="button" class="doc-delete" title="删除">×</button>`;
  el.querySelector('.doc-delete').addEventListener('click', () => deleteDoc(name, el));
  if (prepend) docList.prepend(el); else docList.appendChild(el);
  return el;
}

async function deleteDoc(name, el) {
  if (!confirm(`删除「${name}」？此操作会从知识库中移除该文档。`)) return;
  const statusEl = el.querySelector('.doc-status');
  statusEl.textContent = '删除中…';
  try {
    const r = await fetch(`${API}/delete-doc`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filename: name }),
    });
    if (r.ok) {
      el.style.transition = 'opacity 0.3s';
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 300);
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      localStorage.setItem(STORAGE_KEY, JSON.stringify(saved.filter(d => d.name !== name)));
    } else {
      statusEl.textContent = '✗ 删除失败';
      statusEl.style.color = '#ff5555';
    }
  } catch {
    statusEl.textContent = '✗ 无法连接';
    statusEl.style.color = '#ff5555';
  }
}

loadDocHistory();

// ─── 聊天 ───
const chatBox   = document.getElementById('chat-box');
const chatInput = document.getElementById('chat-input');
const sendBtn   = document.getElementById('send-btn');
let isSending   = false;
const CHAT_KEY  = 'mindbase_chat';

const AVATAR_HTML = `<img src="../assets/karen.png" alt="" onerror="this.parentElement.innerHTML='🔥'">`;

function saveMsgToSession(role, html) {
  const msgs = JSON.parse(sessionStorage.getItem(CHAT_KEY) || '[]');
  msgs.push({ role, html });
  sessionStorage.setItem(CHAT_KEY, JSON.stringify(msgs));
}

function restoreChat() {
  const msgs = JSON.parse(sessionStorage.getItem(CHAT_KEY) || '[]');
  if (msgs.length === 0) {
    addMsgRaw('ai', '有什么想问的？');
    return;
  }
  msgs.forEach(({ role, html }) => addMsgRaw(role, html));
}

function addMsgRaw(role, html) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatarInner = role === 'ai' ? AVATAR_HTML : '🙋';
  div.innerHTML = `<div class="msg-avatar">${avatarInner}</div><div class="msg-bubble">${html}</div>`;
  chatBox.appendChild(div);
  return div;
}

chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});
sendBtn.addEventListener('click', e => { e.preventDefault(); sendMsg(); });

function scrollToBottom() {
  requestAnimationFrame(() => { chatBox.scrollTop = chatBox.scrollHeight; });
}

function addMsg(role, html) {
  const div = addMsgRaw(role, html);
  saveMsgToSession(role, html);
  scrollToBottom();
  return div;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="msg-avatar">${AVATAR_HTML}</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chatBox.appendChild(div);
  scrollToBottom();
}

async function sendMsg() {
  const q = chatInput.value.trim();
  if (!q || isSending) return;
  isSending = true;
  chatInput.value = '';
  sendBtn.disabled = true;
  addMsg('user', q);
  addTyping();
  try {
    const r = await fetch(`${API}/query-stream`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, mode }),
    });
    document.getElementById('typing-indicator')?.remove();
    if (!r.ok) {
      addMsg('ai', '⚠️ 请求失败，请检查后端是否运行');
    } else {
      const msgDiv = document.createElement('div');
      msgDiv.className = 'msg ai';
      msgDiv.innerHTML = `<div class="msg-avatar">${AVATAR_HTML}</div><div class="msg-bubble streaming"></div>`;
      chatBox.appendChild(msgDiv);
      const bubble = msgDiv.querySelector('.msg-bubble');

      const reader = r.body.getReader();
      const decoder = new TextDecoder();
      let fullText = '';
      let leftover = '';

      outer: while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        leftover += decoder.decode(value, { stream: true });
        const lines = leftover.split('\n');
        leftover = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = line.slice(6).trim();
          if (payload === '[DONE]') break outer;
          try {
            fullText += JSON.parse(payload).t;
            bubble.textContent = fullText;
            scrollToBottom();
          } catch {}
        }
      }

      const rendered = marked.parse(fullText);
      bubble.classList.remove('streaming');
      bubble.innerHTML = rendered;
      saveMsgToSession('ai', rendered);
      scrollToBottom();
    }
  } catch {
    document.getElementById('typing-indicator')?.remove();
    addMsg('ai', '⚠️ 无法连接后端，请确认 uvicorn 正在运行');
  }
  sendBtn.disabled = false;
  isSending = false;
}

restoreChat();
</script>
</body>
</html>
